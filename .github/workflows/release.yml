name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            label: linux-amd64
            test: true

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            label: linux-arm64
            cross: true

          - target: aarch64-apple-darwin
            os: macos-14
            label: darwin-arm64

    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Run tests
        if: matrix.test
        run: cargo test --workspace

      - name: Install cross-compiler (Linux ARM64)
        if: matrix.cross
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gcc-aarch64-linux-gnu

      - name: Build zotunnel client
        run: |
          cargo build --release --target ${{ matrix.target }} --bin zotunnel

      - name: Package binary
        run: |
          TAG="${GITHUB_REF_NAME}"
          BIN="target/${{ matrix.target }}/release/zotunnel"
          TAR="zotunnel-${TAG}-${{ matrix.label }}.tar.gz"
          tar -czf "$TAR" -C "target/${{ matrix.target }}/release" zotunnel
          # Also emit bare binary name used by server /download
          cp "$BIN" "zotunnel-${{ matrix.label }}"
          echo "📦 $TAR ($(du -h "$TAR" | cut -f1))"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.label }}
          path: |
            *.tar.gz
            zotunnel-${{ matrix.label }}
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum *.tar.gz zotunnel-* > SHA256SUMS.txt || sha256sum *.tar.gz > SHA256SUMS.txt

      - name: List release files
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            dist/*
          body: |
            ## Deploy server (Docker)

            ```bash
            cp .env.example .env   # set DOMAIN, ACME_EMAIL
            docker compose up -d --build
            ```

            ## Install client

            Prefer the one-liner from your server:

            ```bash
            curl -sSL https://YOUR_DOMAIN/install | bash
            zotunnel config set --server YOUR_DOMAIN:6200 --token TOKEN
            zotunnel http 3000
            ```
